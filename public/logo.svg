<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradientPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradientPurple)" opacity="0.1" />

  <!-- Car body (stylized) -->
  <g id="car">
    <!-- Wheel 1 (left) -->
    <circle cx="65" cy="130" r="18" stroke="url(#gradientPurple)" stroke-width="3" />
    <circle cx="65" cy="130" r="10" fill="none" stroke="url(#gradientPurple)" stroke-width="1" />

    <!-- Wheel 2 (right) -->
    <circle cx="135" cy="130" r="18" stroke="url(#gradientPurple)" stroke-width="3" />
    <circle cx="135" cy="130" r="10" fill="none" stroke="url(#gradientPurple)" stroke-width="1" />

    <!-- Car body -->
    <rect x="55" y="80" width="90" height="35" rx="8" fill="url(#gradientPurple)" />

    <!-- Front bumper -->
    <rect x="55" y="115" width="90" height="8" fill="url(#gradientPurple)" opacity="0.7" />

    <!-- Windows (side) -->
    <rect x="60" y="85" width="25" height="15" rx="3" fill="rgba(102, 126, 234, 0.3)" />
    <rect x="115" y="85" width="25" height="15" rx="3" fill="rgba(102, 126, 234, 0.3)" />

    <!-- Headlights -->
    <circle cx="58" cy="112" r="4" fill="url(#gradientPurple)" opacity="0.8" />
    <circle cx="70" cy="112" r="4" fill="url(#gradientPurple)" opacity="0.8" />

    <!-- Taillights -->
    <circle cx="130" cy="112" r="4" fill="#ff6b6b" opacity="0.8" />
    <circle cx="142" cy="112" r="4" fill="#ff6b6b" opacity="0.8" />
  </g>

  <!-- Speedometer/Gauge icon (top right) -->
  <g id="gauge" transform="translate(140, 45)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#gradientPurple)" stroke-width="1.5" />
    <line x1="0" y1="-10" x2="0" y2="-7" stroke="url(#gradientPurple)" stroke-width="2" />
    <line x1="7" y1="-7" x2="5" y2="-5" stroke="url(#gradientPurple)" stroke-width="1.5" opacity="0.6" />
    <circle cx="0" cy="0" r="2" fill="url(#gradientPurple)" />
  </g>
</svg>
